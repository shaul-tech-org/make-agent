services:
  backend:
    build:
      context: ./backend
    ports:
      - "8701:8000"
    environment:
      - APP_DEBUG=true
      - APP_CORS_ORIGINS=["http://localhost:5173","http://localhost:3000","https://make-agent.shaul.kr"]
      - APP_DATABASE_URL=postgresql+asyncpg://make_agent:make_agent_dev@postgres:5432/make_agent
      - APP_GITHUB_TOKEN=${GITHUB_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    ports:
      - "8700:80"
    depends_on:
      - backend
    restart: unless-stopped

  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: make_agent
      POSTGRES_USER: make_agent
      POSTGRES_PASSWORD: make_agent_dev
    ports:
      - "5436:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U make_agent"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:8-alpine
    ports:
      - "6381:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
